<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spelling Bee</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Screens ── */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  max-width: 600px;
  padding: 40px 24px;
  text-align: center;
}

/* ── Start Screen ── */
#start-screen .icon {
  font-size: 80px;
  margin-bottom: 20px;
  line-height: 1;
}

#start-screen h1 {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 10px;
  background: linear-gradient(135deg, #ffd32a, #ff6b6b, #7bed9f, #70a1ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#start-screen .subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 28px;
}

#start-screen .best-display {
  font-size: 15px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 18px;
}

#start-screen .best-display span {
  color: #ffd32a;
  font-weight: 700;
}

#speech-warning {
  display: none;
  background: rgba(255,107,107,0.18);
  border: 1px solid rgba(255,107,107,0.4);
  color: #ff6b6b;
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  margin-bottom: 18px;
  max-width: 420px;
}

.btn-start {
  background: #ffd32a;
  color: #1a1a2e;
  border: none;
  border-radius: 50px;
  padding: 16px 60px;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 20px rgba(255,211,42,0.35);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(255,211,42,0.5);
}

.btn-start:active { transform: translateY(0); }

/* ── Game Screen ── */
#game-screen {
  gap: 0;
}

#hud {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  width: 100%;
  margin-bottom: 28px;
  font-size: 16px;
  font-weight: 600;
}

.hud-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.hud-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.4);
}

.hud-value {
  font-size: 28px;
  font-weight: 800;
  color: #ffd32a;
}

.hud-value.best { color: #7bed9f; }

#lang-flag {
  font-size: 52px;
  margin-bottom: 20px;
  line-height: 1;
}

#lang-label {
  font-size: 14px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 20px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

#replay-btn {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.2);
  color: #fff;
  font-size: 24px;
  cursor: pointer;
  transition: background 0.15s, transform 0.15s;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#replay-btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.08);
}

#replay-btn:active { transform: scale(0.96); }

#accent-helper {
  display: none;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 18px;
  width: 100%;
}

.accent-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 16px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}

.accent-btn:hover { background: rgba(255,255,255,0.22); }

#input-row {
  display: flex;
  gap: 10px;
  width: 100%;
  margin-bottom: 14px;
}

#word-input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 14px;
  color: #fff;
  font-size: 22px;
  padding: 14px 18px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

#word-input::placeholder { color: rgba(255,255,255,0.3); }
#word-input:focus { border-color: rgba(255,211,42,0.5); box-shadow: 0 0 0 3px rgba(255,211,42,0.12); }

#word-input.input-correct {
  border-color: #7bed9f;
  box-shadow: 0 0 0 3px rgba(123,237,159,0.2);
}

#word-input.input-wrong {
  border-color: #ff6b6b;
  box-shadow: 0 0 0 3px rgba(255,107,107,0.2);
}

#submit-btn {
  background: #ffd32a;
  color: #1a1a2e;
  border: none;
  border-radius: 14px;
  padding: 14px 24px;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  white-space: nowrap;
}

#submit-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(255,211,42,0.4); }
#submit-btn:active { transform: translateY(0); }

#hint-text {
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  margin-bottom: 16px;
}

#feedback {
  font-size: 16px;
  min-height: 24px;
  font-weight: 600;
}

.feedback-wrong {
  color: #ff6b6b;
}

/* ── Game Over Screen ── */
#game-over-screen .icon {
  font-size: 80px;
  margin-bottom: 20px;
  line-height: 1;
}

#game-over-screen h2 {
  font-size: 42px;
  font-weight: 800;
  margin-bottom: 24px;
  background: linear-gradient(135deg, #ff6b6b, #ffd32a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.result-block {
  margin-bottom: 8px;
  font-size: 18px;
  color: rgba(255,255,255,0.7);
}

.result-block .highlight {
  color: #ffd32a;
  font-weight: 800;
  font-size: 22px;
}

.result-block .highlight.best { color: #7bed9f; }

#new-record {
  display: none;
  font-size: 22px;
  font-weight: 800;
  color: #ffd32a;
  margin: 16px 0;
  animation: pulse 0.8s ease-in-out infinite alternate;
}

@keyframes pulse {
  from { opacity: 0.7; transform: scale(0.97); }
  to   { opacity: 1;   transform: scale(1.03); }
}

#game-over-screen .btn-start { margin-top: 28px; }

/* ── Confetti ── */
@keyframes confetti-fall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 999;
  animation: confetti-fall linear forwards;
}

/* ── Shake ── */
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%      { transform: translateX(-10px); }
  40%      { transform: translateX(10px); }
  60%      { transform: translateX(-8px); }
  80%      { transform: translateX(8px); }
}

body.shake { animation: shake 0.4s ease; }

/* ── Responsive ── */
@media (max-width: 480px) {
  #start-screen h1 { font-size: 36px; }
  #word-input { font-size: 18px; padding: 12px 14px; }
  #submit-btn { font-size: 15px; padding: 12px 16px; }
  .hud-value { font-size: 22px; }
}
</style>
</head>
<body>

<!-- ══ Start Screen ══ -->
<div id="start-screen" class="screen">
  <div class="icon">🐝</div>
  <h1>Spelling Bee</h1>
  <p class="subtitle">Listen. Spell. Repeat!</p>
  <p class="best-display">Best streak: <span id="start-best">0</span></p>
  <div id="speech-warning">
    ⚠️ Your browser does not support text-to-speech. The game requires audio to play.
  </div>
  <button class="btn-start" id="start-btn">Start</button>
</div>

<!-- ══ Game Screen ══ -->
<div id="game-screen" class="screen">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">Streak</span>
      <span class="hud-value" id="hud-streak">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">Best</span>
      <span class="hud-value best" id="hud-best">0</span>
    </div>
  </div>

  <div id="lang-flag"></div>
  <div id="lang-label"></div>

  <button id="replay-btn" title="Hear again">🔊</button>

  <div id="accent-helper"></div>

  <div id="input-row">
    <input id="word-input" type="text" placeholder="Type the word…" autocomplete="off"
           autocorrect="off" autocapitalize="off" spellcheck="false">
    <button id="submit-btn">Check ✓</button>
  </div>

  <p id="hint-text">Press Enter or click Check</p>
  <div id="feedback"></div>
</div>

<!-- ══ Game Over Screen ══ -->
<div id="game-over-screen" class="screen">
  <div class="icon">🐝</div>
  <h2>Game Over!</h2>
  <p class="result-block">Your streak: <span class="highlight" id="over-streak">0</span></p>
  <p class="result-block">Best streak: <span class="highlight best" id="over-best">0</span></p>
  <div id="new-record">🏆 New Record!</div>
  <button class="btn-start" id="play-again-btn">Play Again</button>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   Word lists
══════════════════════════════════════════ */
const WORDS_EN = [
  "necessary", "separate", "rhythm", "beautiful", "Wednesday",
  "environment", "accommodation", "definitely", "occurrence", "embarrass",
  "conscience", "privilege", "restaurant", "temperature", "immediately",
  "beginning", "calendar", "cemetery", "committee", "experience",
  "government", "guarantee", "independent", "knowledge", "library",
  "lightning", "millennium", "miniature", "miscellaneous", "neighborhood",
  "occasion", "parliament", "perseverance", "possession", "preference",
  "principal", "profession", "questionnaire", "recommend", "reference",
  "refrigerator", "relevant", "sacrifice", "secretary", "sentence",
  "surprise", "thorough", "tomorrow", "unfortunately", "vacuum",
  "vegetable", "weather", "acquaintance", "achievement", "advertise",
  "appreciate", "awkward", "borough", "boundary", "brilliant",
  "broccoli", "business", "category", "challenge", "characteristic",
  "colonel", "communication", "competition", "consequence", "convenience",
  "correspondence", "curiosity", "daughter", "descendant", "dictionary",
  "disappear", "disappointment", "discipline", "enthusiasm", "exaggerate",
  "excellent", "existence", "familiar", "fascinate", "foreign",
  "frequently", "generous", "gorgeous", "gradually", "handkerchief",
  "happened", "height", "imaginary", "intelligence", "interference",
  "interrupt", "island", "jealous", "language", "leisure",
  "maintenance", "marvellous", "medicine", "mischievous", "mysterious"
];

const WORDS_FR = [
  "aujourd'hui", "beaucoup", "bibliothèque", "papillon", "tranquille",
  "appareil", "conscience", "accueillir", "malheureusement", "nécessaire",
  "développement", "environnement", "gouvernement", "quelquefois", "maintenant",
  "certainement", "accompagner", "approfondir", "apprentissage", "bouilloire",
  "brouillard", "cueillette", "éblouissant", "effervescent", "enveloppe",
  "équilibre", "exceptionnel", "fréquemment", "gargouille", "gentillesse",
  "grammaire", "horizontalement", "hypothèse", "immédiatement", "inauguration",
  "intéressant", "irresponsable", "journaliste", "kilogramme", "laborieusement",
  "léopard", "littérature", "magnifique", "malheureux", "mathématiques",
  "merveilleux", "nonchalamment", "orchestre", "orthographe", "parallèle",
  "parapluie", "persévérance", "philosophie", "photographie", "pourriture",
  "printemps", "psychologie", "quincaillerie", "rassemblement", "réfrigérateur",
  "renseignement", "sauterelle", "silhouette", "soigneusement", "surveillance",
  "sympathique", "température", "tournesol", "tourbillon", "transparent",
  "tremblement", "tyrannosaure", "vraisemblable", "abricot", "ambulance",
  "attention", "autoroute", "boulangerie", "camouflage", "catastrophe",
  "chauffeur", "chocolat", "citrouille", "communauté", "construction",
  "conversation", "correspondance", "courageux", "crocodile", "dangereux",
  "différence", "dinosaure", "électricité", "enthousiasme", "épouvantail",
  "extraordinaire", "fourmi", "grenouille", "hérisson", "hippopotame"
];

/* ══════════════════════════════════════════
   Accent helper characters
══════════════════════════════════════════ */
const ACCENTS = ['é','è','ê','ë','à','â','ç','î','ï','ô','ù','û'];

/* ══════════════════════════════════════════
   DOM refs
══════════════════════════════════════════ */
const startScreen    = document.getElementById('start-screen');
const gameScreen     = document.getElementById('game-screen');
const gameOverScreen = document.getElementById('game-over-screen');

const startBest  = document.getElementById('start-best');
const hudStreak  = document.getElementById('hud-streak');
const hudBest    = document.getElementById('hud-best');
const overStreak = document.getElementById('over-streak');
const overBest   = document.getElementById('over-best');

const langFlag     = document.getElementById('lang-flag');
const langLabel    = document.getElementById('lang-label');
const replayBtn    = document.getElementById('replay-btn');
const accentHelper = document.getElementById('accent-helper');
const wordInput    = document.getElementById('word-input');
const submitBtn    = document.getElementById('submit-btn');
const feedback     = document.getElementById('feedback');
const newRecord    = document.getElementById('new-record');
const speechWarn   = document.getElementById('speech-warning');

const startBtn    = document.getElementById('start-btn');
const playAgain   = document.getElementById('play-again-btn');

/* ══════════════════════════════════════════
   Game state
══════════════════════════════════════════ */
const LS_KEY = 'spelling-bee-best-streak';
let currentWords = [];
let currentIndex = 0;
let streak       = 0;
let bestStreak   = parseInt(localStorage.getItem(LS_KEY) || '0', 10);
let currentWord  = null; // { word, lang }
let answerLocked = false;

/* ══════════════════════════════════════════
   Screen management
══════════════════════════════════════════ */
function showScreen(screen) {
  [startScreen, gameScreen, gameOverScreen].forEach(s => s.style.display = 'none');
  screen.style.display = 'flex';
}

function updateBestDisplay() {
  startBest.textContent  = bestStreak;
  hudBest.textContent    = bestStreak;
  overBest.textContent   = bestStreak;
}

/* ══════════════════════════════════════════
   Utilities
══════════════════════════════════════════ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildWordList() {
  const en = WORDS_EN.map(w => ({ word: w, lang: 'en' }));
  const fr = WORDS_FR.map(w => ({ word: w, lang: 'fr' }));
  return shuffle([...en, ...fr]);
}

/* ══════════════════════════════════════════
   Speech
══════════════════════════════════════════ */
function speakWord(word, lang) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = (lang === 'fr') ? 'fr-FR' : 'en-US';
  utt.rate = 0.9;
  window.speechSynthesis.speak(utt);
}

/* ══════════════════════════════════════════
   Accent helper
══════════════════════════════════════════ */
function setupAccentHelper() {
  accentHelper.textContent = '';
  ACCENTS.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'accent-btn';
    btn.textContent = ch;
    btn.type = 'button';
    btn.addEventListener('click', () => {
      const start = wordInput.selectionStart;
      const end   = wordInput.selectionEnd;
      const val   = wordInput.value;
      wordInput.value = val.slice(0, start) + ch + val.slice(end);
      const pos = start + 1;
      wordInput.setSelectionRange(pos, pos);
      wordInput.focus();
    });
    accentHelper.appendChild(btn);
  });
}

/* ══════════════════════════════════════════
   Game init
══════════════════════════════════════════ */
function initGame() {
  currentWords = buildWordList();
  currentIndex = 0;
  streak       = 0;
  answerLocked = false;
  updateBestDisplay();
  hudStreak.textContent = '0';
  showScreen(gameScreen);
  nextWord();
}

/* ══════════════════════════════════════════
   Core game loop
══════════════════════════════════════════ */
function nextWord() {
  if (currentIndex >= currentWords.length) {
    currentWords = buildWordList();
    currentIndex = 0;
  }

  answerLocked = false;
  currentWord  = currentWords[currentIndex];

  // Language UI
  if (currentWord.lang === 'fr') {
    langFlag.textContent  = '🇫🇷';
    langLabel.textContent = 'Français';
    accentHelper.style.display = 'flex';
  } else {
    langFlag.textContent  = '🇬🇧';
    langLabel.textContent = 'English';
    accentHelper.style.display = 'none';
  }

  // Clear state
  wordInput.value = '';
  wordInput.className = '';
  feedback.textContent = '';
  feedback.className = '';

  wordInput.focus();
  speakWord(currentWord.word, currentWord.lang);
}

function endGame() {
  let newBest = false;
  if (streak > bestStreak) {
    bestStreak = streak;
    localStorage.setItem(LS_KEY, bestStreak);
    newBest = true;
  }

  overStreak.textContent = streak;
  updateBestDisplay();
  newRecord.style.display = newBest ? 'block' : 'none';
  showScreen(gameOverScreen);
}

function checkAnswer() {
  if (answerLocked) return;
  const val = wordInput.value.trim();
  if (val === '') return;

  answerLocked = true;

  if (val === currentWord.word) {
    // Correct
    streak++;
    hudStreak.textContent = streak;
    if (streak > bestStreak) {
      bestStreak = streak;
      updateBestDisplay();
    }
    wordInput.classList.add('input-correct');
    feedback.textContent = '';
    feedback.className = '';
    showConfetti();
    currentIndex++;
    setTimeout(() => {
      nextWord();
    }, 1200);
  } else {
    // Wrong
    wordInput.classList.add('input-wrong');
    document.body.classList.add('shake');
    feedback.className = 'feedback-wrong';
    feedback.textContent = 'The correct spelling: ' + currentWord.word;
    setTimeout(() => {
      document.body.classList.remove('shake');
      endGame();
    }, 2000);
  }
}

/* ══════════════════════════════════════════
   Confetti
══════════════════════════════════════════ */
function showConfetti() {
  const colors = ['#ffd32a','#ff6b6b','#7bed9f','#70a1ff','#ff9ff3'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left     = Math.random() * 100 + 'vw';
    el.style.top      = '-12px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    const dur = (0.8 + Math.random() * 1.0).toFixed(2);
    const delay = (Math.random() * 0.3).toFixed(2);
    el.style.animationDuration = dur + 's';
    el.style.animationDelay    = delay + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

/* ══════════════════════════════════════════
   Event listeners
══════════════════════════════════════════ */
startBtn.addEventListener('click', initGame);
playAgain.addEventListener('click', initGame);

replayBtn.addEventListener('click', () => {
  if (currentWord) speakWord(currentWord.word, currentWord.lang);
});

submitBtn.addEventListener('click', checkAnswer);

wordInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

/* ══════════════════════════════════════════
   Boot
══════════════════════════════════════════ */
(function boot() {
  updateBestDisplay();
  setupAccentHelper();

  if (!window.speechSynthesis) {
    speechWarn.style.display = 'block';
  }

  showScreen(startScreen);
})();
</script>
</body>
</html>
