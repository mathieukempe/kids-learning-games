<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'École de Magie — Conjugaison</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 100%);
  color: #fff;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}

/* ── Back Link ── */
.back-link {
  position: fixed;
  top: 16px;
  left: 16px;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 15px;
  z-index: 100;
  transition: color 0.2s;
}
.back-link:hover { color: #ffd866; }

/* ── Starry Background ── */
.stars, .stars2, .stars3 {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

.stars::after, .stars2::after, .stars3::after {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: #fff;
}

.stars::after {
  box-shadow:
    25px 30px #fff, 80px 90px #fff, 150px 20px #fff, 210px 150px #fff,
    300px 60px #fff, 380px 200px #fff, 450px 40px #fff, 520px 180px #fff,
    600px 80px #fff, 680px 250px #fff, 750px 30px #fff, 820px 160px #fff,
    50px 300px #fff, 130px 350px #fff, 240px 280px #fff, 340px 320px #fff,
    420px 380px #fff, 510px 310px #fff, 590px 360px #fff, 670px 290px #fff,
    760px 340px #fff, 840px 380px #fff, 100px 420px #fff, 200px 460px #fff,
    320px 440px #fff, 440px 480px #fff, 560px 420px #fff, 650px 460px #fff,
    730px 500px #fff, 810px 440px #fff, 900px 50px #fff, 950px 200px #fff,
    1000px 120px #fff, 1050px 300px #fff, 1100px 80px #fff, 1150px 250px #fff,
    1200px 160px #fff, 1250px 350px #fff, 1300px 40px #fff, 1350px 280px #fff,
    900px 400px #fff, 1000px 450px #fff, 1100px 380px #fff, 1200px 500px #fff,
    170px 520px #fff, 290px 560px #fff, 410px 540px #fff, 530px 580px #fff,
    660px 530px #fff, 780px 570px #fff, 890px 520px #fff, 1020px 560px #fff;
  animation: twinkle1 4s ease-in-out infinite;
}

.stars2::after {
  box-shadow:
    45px 70px rgba(255,255,255,0.7), 120px 130px rgba(255,255,255,0.6),
    190px 50px rgba(255,255,255,0.8), 270px 190px rgba(255,255,255,0.5),
    360px 100px rgba(255,255,255,0.7), 430px 240px rgba(255,255,255,0.6),
    500px 70px rgba(255,255,255,0.8), 580px 220px rgba(255,255,255,0.5),
    660px 120px rgba(255,255,255,0.7), 740px 290px rgba(255,255,255,0.6),
    810px 50px rgba(255,255,255,0.8), 880px 190px rgba(255,255,255,0.5),
    60px 340px rgba(255,255,255,0.7), 180px 400px rgba(255,255,255,0.6),
    280px 360px rgba(255,255,255,0.8), 390px 420px rgba(255,255,255,0.5),
    480px 350px rgba(255,255,255,0.7), 570px 410px rgba(255,255,255,0.6),
    950px 140px rgba(255,255,255,0.7), 1060px 230px rgba(255,255,255,0.6),
    1140px 50px rgba(255,255,255,0.8), 1230px 180px rgba(255,255,255,0.5),
    700px 480px rgba(255,255,255,0.7), 850px 510px rgba(255,255,255,0.6);
  animation: twinkle2 5s ease-in-out infinite;
}

.stars3::after {
  width: 3px; height: 3px;
  box-shadow:
    110px 60px #ffd866, 350px 150px #ffd866, 580px 40px #ffd866,
    780px 200px #ffd866, 1000px 90px #ffd866, 250px 400px #ffd866,
    620px 350px #ffd866, 900px 450px #ffd866, 450px 500px #ffd866,
    1200px 300px #ffd866;
  animation: twinkle3 6s ease-in-out infinite;
}

@keyframes twinkle1 {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes twinkle2 {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
@keyframes twinkle3 {
  0%, 100% { opacity: 1; }
  33% { opacity: 0.3; }
  66% { opacity: 0.8; }
}

/* ── Castle Silhouette ── */
.castle {
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: 220px;
  z-index: 1;
  pointer-events: none;
}

.castle svg {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 220px;
}

/* ── Screens ── */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 100vh;
  padding: 40px 24px;
  text-align: center;
  position: relative;
  z-index: 10;
}
.screen.active { display: flex; }
.hidden { display: none !important; }

/* ── Title Screen ── */
#title-screen .game-icon {
  font-size: 80px;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.6));
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

#title-screen h1 {
  font-size: 48px;
  font-weight: 800;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #ffd866, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
}

#title-screen .subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}

#title-screen .stats {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 24px;
  line-height: 1.8;
}
#title-screen .stats span {
  color: #ffd866;
  font-weight: 700;
}

.btn {
  border: none;
  border-radius: 16px;
  padding: 16px 48px;
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: inherit;
  margin: 6px;
}
.btn:hover {
  transform: translateY(-2px);
}
.btn:active {
  transform: translateY(0);
}

.btn-play {
  background: linear-gradient(135deg, #ffd866, #f0c040);
  color: #1a0a2e;
  box-shadow: 0 4px 24px rgba(255,216,102,0.4);
}
.btn-play:hover {
  box-shadow: 0 6px 32px rgba(255,216,102,0.6);
}

.btn-continue {
  background: rgba(168,85,247,0.25);
  color: #d8b4fe;
  border: 2px solid rgba(168,85,247,0.4);
  box-shadow: 0 4px 20px rgba(168,85,247,0.2);
}
.btn-continue:hover {
  background: rgba(168,85,247,0.35);
  box-shadow: 0 6px 28px rgba(168,85,247,0.3);
}

/* ── Round Intro Screen ── */
#round-intro-screen .grimoire {
  font-size: 72px;
  margin-bottom: 16px;
  animation: roundIntroIn 0.6s ease-out both;
}

#round-intro-screen .round-label {
  font-size: 16px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
  animation: roundIntroIn 0.6s ease-out 0.1s both;
}

#round-intro-screen .round-verb {
  font-size: 40px;
  font-weight: 800;
  background: linear-gradient(135deg, #ffd866, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  animation: roundIntroIn 0.6s ease-out 0.2s both;
}

#round-intro-screen .round-mechanic {
  font-size: 20px;
  color: #d8b4fe;
  animation: roundIntroIn 0.6s ease-out 0.3s both;
}

@keyframes roundIntroIn {
  0% { opacity: 0; transform: scale(0.7); }
  100% { opacity: 1; transform: scale(1); }
}

/* ── Round Play Screen ── */
#round-play-screen {
  color: rgba(255,255,255,0.3);
  font-size: 24px;
}

/* ── Round Summary Screen ── */
#round-summary-screen .summary-icon {
  font-size: 64px;
  margin-bottom: 16px;
}

#round-summary-screen .summary-title {
  font-size: 32px;
  font-weight: 800;
  color: #ffd866;
  margin-bottom: 24px;
}

#round-summary-screen .summary-crystals {
  font-size: 22px;
  color: #fff;
  margin-bottom: 20px;
}

#round-summary-screen .summary-crystals span {
  color: #ffd866;
  font-weight: 700;
}

#round-summary-screen .constellation-progress {
  font-size: 18px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 32px;
  line-height: 1.8;
}

/* ── Victory Screen ── */
#victory-screen .victory-icon {
  font-size: 80px;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
}

#victory-screen .victory-title {
  font-size: 40px;
  font-weight: 800;
  background: linear-gradient(135deg, #ffd866, #a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

#victory-screen .victory-subtitle {
  font-size: 18px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 24px;
}

#victory-screen .victory-crystals {
  font-size: 28px;
  color: #ffd866;
  font-weight: 700;
  margin-bottom: 8px;
}

#victory-screen .victory-streak {
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  #title-screen h1 { font-size: 34px; }
  #title-screen .game-icon { font-size: 60px; }
  .btn { padding: 14px 36px; font-size: 18px; }
}
</style>
</head>
<body>

<script>
/* ── Screen Management ── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(id + '-screen');
  if (target) target.classList.add('active');
}

/* ── Local Storage Keys ── */
const LS_PREFIX = 'ecoleDeMagie_';
const LS_CURRENT_ROUND = LS_PREFIX + 'currentRound';
const LS_BEST_STREAK = LS_PREFIX + 'bestStreak';
const LS_BEST_CRYSTALS = LS_PREFIX + 'bestCrystals';
const LS_GAME_STATE = LS_PREFIX + 'gameState';

/* ── Title Screen Setup ── */
function initTitleScreen() {
  // Display best stats
  const bestStreak = localStorage.getItem(LS_BEST_STREAK) || '0';
  const bestCrystals = localStorage.getItem(LS_BEST_CRYSTALS) || '0';
  document.getElementById('best-streak').textContent = bestStreak;
  document.getElementById('best-crystals').textContent = bestCrystals;

  // Show "Continuer" button if a saved game exists
  const savedRound = localStorage.getItem(LS_CURRENT_ROUND);
  const btnContinue = document.getElementById('btn-continue');
  if (savedRound) {
    btnContinue.classList.remove('hidden');
  } else {
    btnContinue.classList.add('hidden');
  }
}

/* ── Conjugation Data ── */
const VERBS = {
  'être': {
    conjugations: [
      { pronoun: 'je', form: 'suis' },
      { pronoun: 'tu', form: 'es' },
      { pronoun: 'il/elle', form: 'est' },
      { pronoun: 'nous', form: 'sommes' },
      { pronoun: 'vous', form: 'êtes' },
      { pronoun: 'ils/elles', form: 'sont' }
    ],
    sentences: [
      { text: 'Je ___ une sorcière', answer: 'suis' },
      { text: 'Tu ___ très courageux', answer: 'es' },
      { text: 'Elle ___ dans le château', answer: 'est' },
      { text: 'Nous ___ des apprentis', answer: 'sommes' },
      { text: 'Vous ___ prêts pour le sortilège', answer: 'êtes' },
      { text: 'Ils ___ au sommet de la tour', answer: 'sont' },
      { text: 'Je ___ prête pour la magie', answer: 'suis' },
      { text: 'Tu ___ le meilleur élève', answer: 'es' },
      { text: 'Il ___ invisible', answer: 'est' },
      { text: 'Nous ___ dans la forêt enchantée', answer: 'sommes' },
      { text: 'Vous ___ les gardiens du grimoire', answer: 'êtes' },
      { text: 'Elles ___ très puissantes', answer: 'sont' }
    ]
  },
  'avoir': {
    conjugations: [
      { pronoun: "j'", form: 'ai' },
      { pronoun: 'tu', form: 'as' },
      { pronoun: 'il/elle', form: 'a' },
      { pronoun: 'nous', form: 'avons' },
      { pronoun: 'vous', form: 'avez' },
      { pronoun: 'ils/elles', form: 'ont' }
    ],
    sentences: [
      { text: "J' ___ un balai magique", answer: 'ai' },
      { text: 'Tu ___ une baguette dorée', answer: 'as' },
      { text: 'Elle ___ un chat noir', answer: 'a' },
      { text: 'Nous ___ des potions secrètes', answer: 'avons' },
      { text: 'Vous ___ le grimoire ancien', answer: 'avez' },
      { text: 'Ils ___ des pouvoirs magiques', answer: 'ont' },
      { text: "J' ___ une étoile brillante", answer: 'ai' },
      { text: 'Tu ___ le chapeau pointu', answer: 'as' },
      { text: 'Il ___ la clé du donjon', answer: 'a' },
      { text: 'Nous ___ des cristaux enchantés', answer: 'avons' },
      { text: 'Vous ___ les ingrédients magiques', answer: 'avez' },
      { text: 'Elles ___ des ailes invisibles', answer: 'ont' }
    ]
  }
};

const ROUNDS = [
  { verb: 'être', mechanic: 'spellCasting' },
  { verb: 'avoir', mechanic: 'spellCasting' },
  { verb: 'être', mechanic: 'enchantedSentences' },
  { verb: 'avoir', mechanic: 'enchantedSentences' },
  { verb: 'être', mechanic: 'runeMatching' },
  { verb: 'avoir', mechanic: 'runeMatching' }
];

const MECHANIC_NAMES = {
  spellCasting: 'Lancer de Sorts',
  enchantedSentences: 'Phrases Enchantées',
  runeMatching: 'Runes Magiques'
};

/* ── Game State ── */
const state = {
  currentRound: 0,
  currentQuestion: 0,
  crystals: 0,
  streak: 0,
  bestStreak: parseInt(localStorage.getItem(LS_BEST_STREAK)) || 0,
  bestCrystals: parseInt(localStorage.getItem(LS_BEST_CRYSTALS)) || 0,
  constellations: { 'être': 0, 'avoir': 0 },
  firstTry: true
};

/* ── Game Flow ── */
function startGame(fromRound) {
  const round = fromRound !== undefined ? fromRound : 0;
  state.currentRound = round;
  if (round === 0) {
    state.crystals = 0;
    state.streak = 0;
    state.constellations = { 'être': 0, 'avoir': 0 };
  } else {
    loadProgress();
  }
  showRoundIntro();
}

function showRoundIntro() {
  const round = ROUNDS[state.currentRound];
  document.getElementById('round-label').textContent = 'Tour ' + (state.currentRound + 1) + ' / ' + ROUNDS.length;
  document.getElementById('round-verb').textContent = 'Sortil\u00e8ge : ' + round.verb;
  document.getElementById('round-mechanic').textContent = MECHANIC_NAMES[round.mechanic];
  showScreen('round-intro');
  setTimeout(startRound, 2000);
}

function startRound() {
  state.currentQuestion = 0;
  state.firstTry = true;
  const round = ROUNDS[state.currentRound];
  showScreen('round-play');
  switch (round.mechanic) {
    case 'spellCasting': startSpellCasting(round.verb); break;
    case 'enchantedSentences': startEnchantedSentences(round.verb); break;
    case 'runeMatching': startRuneMatching(round.verb); break;
  }
}

function endQuestion(correct) {
  if (correct) {
    state.crystals += state.firstTry ? 2 : 1;
    state.streak++;
    if (state.streak > state.bestStreak) {
      state.bestStreak = state.streak;
      localStorage.setItem(LS_BEST_STREAK, state.bestStreak);
    }
  } else {
    state.streak = 0;
    state.firstTry = false;
    return; // wrong answer — let player try again
  }
  state.currentQuestion++;
  state.firstTry = true;
  if (state.currentQuestion >= 6) {
    showRoundSummary();
  }
  // else: the active mechanic handles showing the next question
}

function showRoundSummary() {
  const round = ROUNDS[state.currentRound];
  state.constellations[round.verb]++;
  saveProgress();

  document.getElementById('summary-crystals-count').textContent = state.crystals;

  // Build constellation progress display using safe DOM methods
  var progressEl = document.getElementById('constellation-progress');
  progressEl.textContent = '';
  var verbs = ['être', 'avoir'];
  for (var v = 0; v < verbs.length; v++) {
    var verb = verbs[v];
    var filled = state.constellations[verb];
    var total = 3;
    var line = verb + ' : ';
    for (var i = 0; i < total; i++) {
      line += i < filled ? '\u2B50' : '\u2606';
    }
    progressEl.appendChild(document.createTextNode(line));
    if (v < verbs.length - 1) {
      progressEl.appendChild(document.createElement('br'));
    }
  }

  showScreen('round-summary');
}

function showVictory() {
  if (state.crystals > state.bestCrystals) {
    state.bestCrystals = state.crystals;
    localStorage.setItem(LS_BEST_CRYSTALS, state.bestCrystals);
  }
  localStorage.removeItem(LS_CURRENT_ROUND);
  localStorage.removeItem(LS_GAME_STATE);

  document.getElementById('victory-crystals').textContent = state.crystals + ' \uD83D\uDC8E';
  document.getElementById('victory-streak').textContent = 'Meilleure s\u00e9rie : ' + state.bestStreak;

  showScreen('victory');
}

function saveProgress() {
  localStorage.setItem(LS_CURRENT_ROUND, state.currentRound);
  localStorage.setItem(LS_GAME_STATE, JSON.stringify({
    crystals: state.crystals,
    streak: state.streak,
    constellations: state.constellations
  }));
}

function loadProgress() {
  var saved = JSON.parse(localStorage.getItem(LS_GAME_STATE) || '{}');
  state.crystals = saved.crystals || 0;
  state.streak = saved.streak || 0;
  state.constellations = saved.constellations || { 'être': 0, 'avoir': 0 };
}

/* ── Button Handlers ── */
document.getElementById('btn-play').addEventListener('click', function() {
  localStorage.removeItem(LS_CURRENT_ROUND);
  localStorage.removeItem(LS_GAME_STATE);
  startGame(0);
});

document.getElementById('btn-continue').addEventListener('click', function() {
  var savedRound = parseInt(localStorage.getItem(LS_CURRENT_ROUND), 10) || 0;
  startGame(savedRound);
});

document.getElementById('btn-next-round').addEventListener('click', function() {
  state.currentRound++;
  if (state.currentRound >= ROUNDS.length) {
    showVictory();
  } else {
    showRoundIntro();
  }
});

document.getElementById('btn-replay').addEventListener('click', function() {
  localStorage.removeItem(LS_CURRENT_ROUND);
  localStorage.removeItem(LS_GAME_STATE);
  initTitleScreen();
  showScreen('title');
});
